<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found — Rock Wu</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #1A1A1D; }

    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .page-404-inner {
      display: flex;
      align-items: center;
      gap: 56px;
    }

    .page-404-img {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .page-404-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .page-404-title {
      font-size: 48px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 36px;
    }

    .page-404-btn {
      display: inline-block;
      padding: 12px 28px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      transition: border-color 0.2s, color 0.2s;
    }
    .page-404-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 600px) {
      .page-404-inner {
        flex-direction: column;
        text-align: center;
        gap: 32px;
      }
      .page-404-img { width: 200px; height: 200px; }
      .page-404-title { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="page-404-inner">
      <img class="page-404-img" src="assets/images/404.webp" alt="窩不知道">
      <div>
        <p class="page-404-label">Something is wrong</p>
        <h1 class="page-404-title">404 Not Found</h1>
        <a class="page-404-btn" href="index.html">Return</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
